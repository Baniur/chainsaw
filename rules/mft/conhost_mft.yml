---
title: conhost.exe Suspicious Location
group: MFT
description: conhost.exe in a different location than standard. Potential Malicious Activity.
authors:
  - Krzysztof Kuzin


kind: mft
level: high
status: stable
timestamp: StandardInfoCreated


fields:
  - name: FileNamePath
    to: FullPath
  - name: StandardInfoLastModified0x10
    to: StandardInfoLastModified
  - name: StandardInfoLastAccess0x10
    to: StandardInfoLastAccess
  - name: FileNameCreated0x30
    to: FileNameCreated
  - name: FileNameLastModified0x30
    to: FileNameLastModified
  - name: FileNameLastAccess0x30
    to: FileNameLastAccess
  - name: FileSize
    to: FileSize
  - name: IsADirectory
    to: IsADirectory
  - name: IsDeleted
    to: IsDeleted
  - name: HasAlternateDataStreams
    to: HasAlternateDataStreams
  - name: DataStreams
    to: DataStreams

filter:
  condition: conhost and not conhost_1

  conhost:
    FullPath:
      - 'i*/conhost.exe*'

  conhost_1:
    FullPath:
      - 'iWindows/System32/conhost.exe'
      - 'iWindows/SysWow64/conhost.exe'
      - 'iWindows/winsxs/x86_microsoft-windows-*'
      - 'iWindows/winsxs/amd64_microsoft-windows-*'
